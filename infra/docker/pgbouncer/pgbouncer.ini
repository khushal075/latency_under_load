[databases]
benchmark = host=postgres port=5432 dbname=benchmark

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# Pooling mode
pool_mode = transaction

# Connection limit
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 10

# Timeouts
server_idle_timeout = 60
server_connect_timeout = 15
query_timeout = 120

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1