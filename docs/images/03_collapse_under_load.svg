<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-surface { fill: #f8f7f4; }
      .text-primary { fill: #1a1a18; }
      .text-secondary { fill: #5f5e5a; }
      .text-tertiary { fill: #888780; }
      .divider { stroke: #d3d1c7; stroke-width: 0.5; }
      .grid { stroke: #e8e6e0; stroke-width: 0.5; }
      .axis { stroke: #b4b2a9; stroke-width: 0.5; }
    </style>
    <!-- async area fill -->
    <linearGradient id="asyncGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0dd97" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c0dd97" stop-opacity="0.05"/>
    </linearGradient>
    <!-- sync area fill -->
    <linearGradient id="syncGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f09595" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f09595" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="760" height="400" rx="12" class="bg"/>
  <rect x="1" y="1" width="758" height="398" rx="11" fill="none" stroke="#d3d1c7" stroke-width="0.5"/>

  <!-- header -->
  <text x="40" y="40" font-size="11" font-weight="500" class="text-tertiary" letter-spacing="0.07em">SUCCESS RATE AS CONCURRENT USERS INCREASE · 0 → 400 VUs</text>
  <text x="40" y="68" font-size="20" font-weight="500" class="text-primary">The moment it breaks</text>

  <line x1="40" y1="84" x2="720" y2="84" class="divider"/>

  <!-- legend -->
  <line x1="40" y1="99" x2="68" y2="99" stroke="#3b6d11" stroke-width="2.5"/>
  <text x="74" y="103" font-size="11" class="text-secondary">Async server (uvicorn 4 workers)</text>
  <line x1="260" y1="99" x2="288" y2="99" stroke="#a32d2d" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="294" y="103" font-size="11" class="text-secondary">Sync server (gunicorn 4 workers)</text>

  <!-- chart area: x=60..720, y=120..330 — height=210, width=660 -->
  <!-- x axis: 0 to 400 users, 660/400 = 1.65px per user -->
  <!-- y axis: 40% to 105%, height=210, range=65%, 1% = 3.23px -->
  <!-- y for val%: 330 - (val-40)*3.23 -->

  <!-- grid lines -->
  <line x1="60" y1="330" x2="720" y2="330" class="axis"/>
  <line x1="60" y1="120" x2="60" y2="330" class="axis"/>

  <!-- horizontal grids -->
  <line x1="60" y1="281" x2="720" y2="281" class="grid"/> <!-- 55% -->
  <line x1="60" y1="233" x2="720" y2="233" class="grid"/> <!-- 70% -->
  <line x1="60" y1="184" x2="720" y2="184" class="grid"/> <!-- 85% -->
  <line x1="60" y1="136" x2="720" y2="136" class="grid"/> <!-- 100% -->

  <!-- y labels: y for val = 330-(val-40)*3.23 -->
  <text x="54" y="334" font-size="10" class="text-tertiary" text-anchor="end">40%</text>
  <text x="54" y="285" font-size="10" class="text-tertiary" text-anchor="end">55%</text>
  <text x="54" y="237" font-size="10" class="text-tertiary" text-anchor="end">70%</text>
  <text x="54" y="188" font-size="10" class="text-tertiary" text-anchor="end">85%</text>
  <text x="54" y="140" font-size="10" class="text-tertiary" text-anchor="end">100%</text>

  <!-- x labels -->
  <!-- x for users = 60 + users*1.65 -->
  <text x="60" y="346" font-size="10" class="text-tertiary" text-anchor="middle">0</text>
  <text x="225" y="346" font-size="10" class="text-tertiary" text-anchor="middle">100</text>
  <text x="390" y="346" font-size="10" class="text-tertiary" text-anchor="middle">200</text>
  <text x="555" y="346" font-size="10" class="text-tertiary" text-anchor="middle">300</text>
  <text x="720" y="346" font-size="10" class="text-tertiary" text-anchor="middle">400</text>
  <text x="390" y="360" font-size="10" class="text-tertiary" text-anchor="middle">concurrent users</text>

  <!-- ASYNC line — stays flat at 100% the whole way -->
  <!-- y for 100% = 330-(100-40)*3.23 = 330-193.8 = 136.2 ≈ 136 -->
  <!-- area fill first -->
  <polygon points="60,136 720,136 720,330 60,330" fill="url(#asyncGrad)"/>
  <!-- line -->
  <polyline points="60,136 720,136" fill="none" stroke="#3b6d11" stroke-width="2.5"/>

  <!-- SYNC line — starts at 100%, degrades as users increase -->
  <!-- data points (users, success%): 0,100 | 50,98 | 100,92 | 150,82 | 200,70 | 250,64 | 300,60 | 350,59 | 400,59 -->
  <!-- x = 60+users*1.65, y = 330-(pct-40)*3.23 -->
  <!-- (0,100)→(60,136) (50,98)→(143,142) (100,92)→(225,162) (150,82)→(308,201) (200,70)→(390,233) (250,64)→(473,272) ... wait, recalc -->
  <!-- y(100)=136, y(98)=136+2*3.23=142.5, y(92)=136+8*3.23=162, y(82)=136+18*3.23=194, y(70)=136+30*3.23=233, y(64)=136+36*3.23=252, y(60)=136+40*3.23=265, y(59)=136+41*3.23=268 -->
  <polygon points="60,136 143,143 225,162 308,194 390,233 473,252 555,265 638,268 720,268 720,330 60,330" fill="url(#syncGrad)"/>
  <polyline points="60,136 143,143 225,162 308,194 390,233 473,252 555,265 638,268 720,268" fill="none" stroke="#a32d2d" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- annotation: collapse zone -->
  <line x1="308" y1="120" x2="308" y2="194" stroke="#a32d2d" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="312" y="135" font-size="11" fill="#a32d2d">starts failing here</text>
  <text x="312" y="148" font-size="11" fill="#a32d2d">~150 users</text>

  <!-- annotation: final state -->
  <text x="580" y="258" font-size="11" fill="#a32d2d">41% failure</text>
  <text x="580" y="271" font-size="11" fill="#a32d2d">at 400 users</text>

  <!-- annotation: async stays flat -->
  <text x="560" y="126" font-size="11" fill="#3b6d11">0% failure — every config</text>

  <line x1="40" y1="374" x2="720" y2="374" class="divider"/>
  <text x="40" y="388" font-size="11" class="text-tertiary">k6 stress_test scenario · modelled from benchmark results · gunicorn_4 vs uvicorn_4 · direct connection</text>
</svg>
